<meta name="description" id="metaDesc" content="">
<meta property="og:title" id="ogTitle" content="">
<meta property="og:description" id="ogDesc" content="">
<meta property="og:image" id="ogImage" content="">
<meta property="og:type" content="article">
<meta property="og:site_name" content="El Amor Existe">
<meta name="twitter:card" content="summary_large_image">

<link rel="canonical" id="canonicalLink" href="https://elamorexiste.com/post.html">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#E8DBCA;--cream-light:#F5EDE0;--warm-brown:#5C3D2E;--mid-brown:#8B5E3C;
  --sand:#B8894A;--sand-light:#E2CBB0;--ink:#1E1209;--text-muted:#5A3F30;
  --serif:'Cormorant Garamond',Georgia,serif;--sans:'Jost',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--cream-light);color:var(--ink);font-weight:300;line-height:1.7;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;background:rgba(250,247,240,0.95);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-bottom:1px solid rgba(140,94,60,0.1)}
.nav-logo{font-family:var(--serif);font-size:1.1rem;color:var(--warm-brown);font-style:italic;font-weight:300;text-decoration:none}
.nav-links{display:flex;gap:1.8rem;list-style:none;align-items:center}
.nav-links a{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;font-weight:400;transition:color .25s}
.nav-links a:hover,.nav-links a.active{color:var(--warm-brown)}
.nav-cta{background:var(--warm-brown)!important;color:#FAF7F0!important;padding:.45rem 1.1rem;border-radius:2px}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--warm-brown)}

/* POST HERO */
.post-hero{padding-top:65px;position:relative;background:var(--warm-brown);min-height:420px;display:flex;flex-direction:column;justify-content:flex-end}
.post-hero-img{position:absolute;inset:0;overflow:hidden}
.post-hero-img img{width:100%;height:100%;object-fit:cover;filter:brightness(.45) sepia(30%)}
.post-hero-gradient{position:absolute;inset:0;background:linear-gradient(to top, rgba(30,18,9,.9) 0%, rgba(30,18,9,.3) 60%, transparent 100%)}
.post-hero-content{position:relative;z-index:2;padding:3rem 2.5rem 2.5rem;max-width:860px;margin:0 auto;width:100%}
.post-back{display:inline-flex;align-items:center;gap:.4rem;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;margin-bottom:1.5rem;transition:color .2s}
.post-back:hover{color:var(--sand)}
.post-cat{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--sand);font-weight:500;margin-bottom:.7rem}
.post-title{font-family:var(--serif);font-size:clamp(2rem,4vw,3.5rem);font-weight:300;color:#FAF7F0;line-height:1.1;margin-bottom:1.2rem;font-style:italic}
.post-meta{font-size:.75rem;color:rgba(255,255,255,.5);letter-spacing:.06em;display:flex;flex-wrap:wrap;gap:.8rem;align-items:center}
.post-meta-sep{opacity:.35}

/* HERO SIN IMAGEN */
.post-hero-noimg{padding-top:65px;background:var(--warm-brown);padding-bottom:2.5rem}
.post-hero-noimg .post-hero-content{position:relative;padding-top:3.5rem}

/* LAYOUT */
.post-layout{max-width:1100px;margin:0 auto;padding:4rem 2.5rem;display:grid;grid-template-columns:1fr 300px;gap:4rem;align-items:start}

/* ARTICLE */
.post-article{min-width:0}
.post-body{font-size:1.05rem;color:var(--text-muted);line-height:1.9}
.post-body h2{font-family:var(--serif);font-size:1.8rem;color:var(--warm-brown);margin:2.5rem 0 1rem;font-weight:400;font-style:italic}
.post-body h3{font-family:var(--serif);font-size:1.3rem;color:var(--mid-brown);margin:2rem 0 .8rem;font-weight:400}
.post-body p{margin-bottom:1.4rem}
.post-body em{font-family:var(--serif);font-style:italic;color:var(--warm-brown);font-size:1.08em;font-weight:400}
.post-body strong{font-weight:500;color:var(--ink)}
.post-body blockquote{border-left:3px solid var(--sand);padding:1rem 1.5rem;margin:2rem 0;background:rgba(184,137,74,.06);border-radius:0 4px 4px 0}
.post-body blockquote p{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--warm-brown);margin-bottom:0}
.post-body ul,.post-body ol{padding-left:1.5rem;margin-bottom:1.4rem}
.post-body li{margin-bottom:.5rem}
.post-body img{max-width:100%;border-radius:4px;margin:1.5rem 0}
.post-body a{color:var(--sand);text-decoration:underline;text-underline-offset:3px}

/* SHARE */
.share-section{margin:3rem 0;padding:2rem;background:var(--cream);border:1px solid var(--sand-light);border-radius:4px}
.share-title{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;font-weight:500}
.share-buttons{display:flex;flex-wrap:nowrap;gap:.4rem}
.share-btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.5rem .6rem;border-radius:2px;font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500;font-family:var(--sans);text-decoration:none;cursor:pointer;border:none;transition:opacity .2s,transform .15s;flex:1;white-space:nowrap}
.share-btn:hover{opacity:.85;transform:translateY(-1px)}
.share-btn:active{transform:translateY(0)}
.share-x{background:#000;color:#fff}
.share-wa{background:#25D366;color:#fff}
.share-fb{background:#1877F2;color:#fff}
.share-li{background:#0A66C2;color:#fff}
.share-tiktok{background:#010101;color:#fff}
.share-instagram{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
.share-youtube{background:#FF0000;color:#fff}
.share-copy{background:var(--warm-brown);color:#FAF7F0}
.share-copied{background:var(--mid-brown)!important}

/* POST NAV */
.post-nav{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:2.5rem 0;border-top:1px solid var(--sand-light);padding-top:2rem}
.post-nav-item{padding:1.2rem 1.5rem;border:1px solid var(--sand-light);border-radius:4px;text-decoration:none;transition:background .2s,border-color .2s}
.post-nav-item:hover{background:var(--cream);border-color:var(--sand)}
.post-nav-dir{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sand);margin-bottom:.4rem}
.post-nav-title{font-family:var(--serif);font-size:.95rem;font-style:italic;color:var(--warm-brown);line-height:1.3}
.post-nav-next{text-align:right}

/* SIDEBAR */
.post-sidebar{position:sticky;top:90px}
.sidebar-section{margin-bottom:2.5rem}
.sidebar-title{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.2rem;padding-bottom:.6rem;border-bottom:1px solid var(--sand-light);font-weight:500}
.recent-item{display:flex;gap:.8rem;padding:.8rem 0;border-bottom:1px solid rgba(184,137,74,.12);text-decoration:none;align-items:flex-start;transition:opacity .2s}
.recent-item:hover{opacity:.75}
.recent-item:last-child{border-bottom:none}
.recent-item-img{width:52px;height:52px;flex-shrink:0;border-radius:3px;overflow:hidden;background:var(--cream)}
.recent-item-img img{width:100%;height:100%;object-fit:cover}
.recent-item-img-placeholder{width:100%;height:100%;background:linear-gradient(135deg,var(--warm-brown),var(--mid-brown));display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:1.2rem}
.recent-item-body{}
.recent-item-cat{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--sand);margin-bottom:.25rem}
.recent-item-title{font-family:var(--serif);font-size:.9rem;font-style:italic;color:var(--warm-brown);line-height:1.35}
.recent-item-date{font-size:.62rem;color:var(--text-muted);margin-top:.2rem}

/* BOOK CTA */
.sidebar-book-cta{background:var(--warm-brown);border-radius:4px;padding:1.5rem;text-align:center}
.sidebar-book-cta p{font-family:var(--serif);font-style:italic;font-size:1.05rem;color:rgba(250,247,240,.85);margin-bottom:1rem;line-height:1.5}
.sidebar-cta-btn{display:inline-block;background:var(--sand);color:#FAF7F0;padding:.65rem 1.4rem;text-decoration:none;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500;border-radius:2px;transition:background .2s}
.sidebar-cta-btn:hover{background:var(--sand-light);color:var(--warm-brown)}

/* COMMENTS */
.comments-section{margin-top:3rem;padding-top:2.5rem;border-top:1px solid var(--sand-light)}
.comments-heading{font-family:var(--serif);font-size:1.6rem;color:var(--warm-brown);font-style:italic;margin-bottom:1.5rem;font-weight:400}
.comment-form{display:flex;flex-direction:column;gap:.8rem;margin-bottom:2.5rem;background:var(--cream);padding:1.5rem;border-radius:4px;border:1px solid var(--sand-light)}
.comment-form-title{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.5rem}
.comment-form input,.comment-form textarea{font-family:var(--sans);font-size:.92rem;font-weight:300;color:var(--ink);background:#fff;border:1px solid var(--sand-light);border-radius:2px;padding:.75rem 1rem;outline:none;transition:border-color .2s;resize:vertical}
.comment-form input:focus,.comment-form textarea:focus{border-color:var(--sand)}
.comment-form textarea{min-height:110px}
.comment-form button{align-self:flex-start;background:var(--warm-brown);color:#FAF7F0;border:none;padding:.72rem 1.8rem;font-family:var(--sans);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-weight:400;border-radius:2px;cursor:pointer;transition:background .2s}
.comment-form button:hover{background:var(--mid-brown)}
.comments-list{display:flex;flex-direction:column;gap:1.2rem}
.comment-item{border-left:2px solid var(--sand-light);padding:.8rem 1.2rem}
.comment-author{font-size:.78rem;font-weight:500;color:var(--warm-brown);margin-bottom:.15rem}
.comment-date{font-size:.68rem;color:var(--sand);margin-bottom:.5rem}
.comment-text{font-size:.92rem;color:var(--text-muted);line-height:1.75}
.no-comments{font-size:.88rem;color:var(--sand);font-style:italic;font-family:var(--serif)}

/* NOT FOUND */
.not-found{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem 2rem}
.not-found h2{font-family:var(--serif);font-size:2rem;color:var(--warm-brown);font-style:italic;margin-bottom:1rem}
.not-found p{color:var(--text-muted);margin-bottom:2rem}

/* FOOTER */
footer{background:var(--ink);padding:3rem 2.5rem;display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-between;align-items:center}
.footer-logo{font-family:var(--serif);font-size:1.1rem;color:var(--sand);font-style:italic;font-weight:300}
.footer-links{display:flex;flex-wrap:wrap;gap:1.5rem;list-style:none}
.footer-links a{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--sand)}
.footer-copy{width:100%;text-align:center;font-size:.7rem;color:var(--text-muted);border-top:1px solid rgba(255,255,255,.06);padding-top:1.5rem;margin-top:.5rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}

@media(max-width:900px){
  .post-layout{grid-template-columns:1fr;gap:2.5rem}
  .post-sidebar{position:static}
}
@media(max-width:768px){
  nav{padding:.9rem 1.5rem}
  .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:var(--cream-light);flex-direction:column;gap:0;border-bottom:1px solid var(--sand-light)}
  .nav-links.open{display:flex}
  .nav-links li a{display:block;padding:.8rem 2rem;border-top:1px solid var(--sand-light)}
  .hamburger{display:flex}
  .post-hero-content{padding:2.5rem 1.5rem 2rem}
  .post-layout{padding:2.5rem 1.5rem}
  .post-nav{grid-template-columns:1fr}
  footer{flex-direction:column;text-align:center;padding:2.5rem 1.5rem}
}
</style>

<script>
/* Smooth scroll polyfill for Safari < 15.4 */
if(!('scrollBehavior' in document.documentElement.style)){
  document.querySelectorAll('a[href^="#"]').forEach(a=>{
    a.addEventListener('click',function(e){
      const target=document.querySelector(this.getAttribute('href'));
      if(target){e.preventDefault();target.scrollIntoView({behavior:'smooth'});}
    });
  });
}
</script>

<script>
// ─── Utilities ───────────────────────────────────────────────────────────────

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });
}

function readingTime(body) {
  const text = (body || '').replace(/<[^>]+>/g, ' ');
  const words = text.trim().split(/\s+/).length;
  return Math.max(1, Math.round(words / 200)) + ' min';
}

// ─── Comments (localStorage — no server needed) ───────────────────────────────
const COMMENTS_KEY = 'lcs_blog_comments';
function getComments(postId) {
  try { const all = JSON.parse(localStorage.getItem(COMMENTS_KEY) || '{}'); return all[postId] || []; }
  catch(e) { return []; }
}
function saveComments(postId, comments) {
  try { const all = JSON.parse(localStorage.getItem(COMMENTS_KEY) || '{}'); all[postId] = comments; localStorage.setItem(COMMENTS_KEY, JSON.stringify(all)); }
  catch(e) {}
}

// ─── URL param ────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const postId = params.get('id');

// ─── Not found ────────────────────────────────────────────────────────────────
function renderNotFound() {
  document.getElementById('postContent').innerHTML = `
    <div style="padding-top:65px">
      <div class="not-found">
        <div>
          <h2>Artículo no encontrado</h2>
          <p>Es posible que haya sido eliminado o que el enlace sea incorrecto.</p>
          <a href="blog.html" class="btn-read" style="display:inline-block;background:var(--sand);color:#FAF7F0;padding:.75rem 1.8rem;text-decoration:none;font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;font-weight:500;border-radius:2px">← Volver al blog</a>
        </div>
      </div>
    </div>`;
}

// ─── Render post ──────────────────────────────────────────────────────────────
function renderPost(post, allPosts) {
  // Meta tags
  document.getElementById('metaTitle').textContent = post.title + ' — El Amor Existe';
  const canonEl = document.getElementById('canonicalLink');
  if (canonEl) canonEl.href = window.location.href;
  document.getElementById('metaDesc').content = post.excerpt || '';
  document.getElementById('ogTitle').content = post.title;
  document.getElementById('ogDesc').content = post.excerpt || '';
  if (post.image) document.getElementById('ogImage').content = post.image;

  // Recent posts (excluding current)
  const published = allPosts
    .filter(p => p.published && p.id !== post.id)
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 4);

  // Prev / Next
  const published_all = allPosts.filter(p => p.published).sort((a, b) => new Date(b.date) - new Date(a.date));
  const idx = published_all.findIndex(p => p.id === post.id);
  const prevPost = idx < published_all.length - 1 ? published_all[idx + 1] : null;
  const nextPost = idx > 0 ? published_all[idx - 1] : null;

  // Hero HTML
  let heroHtml = '';
  if (post.image) {
    heroHtml = `
      <div class="post-hero">
        <div class="post-hero-img">
          <img src="${post.image}" alt="${post.title}"
            onerror="this.closest('.post-hero').style.background='var(--warm-brown)';this.style.display='none'">
        </div>
        <div class="post-hero-gradient"></div>
        <div class="post-hero-content">
          <a href="blog.html" class="post-back">← Blog</a>
          <p class="post-cat">${post.category || ''}</p>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>${formatDate(post.date)}</span>
            <span class="post-meta-sep">·</span>
            <span>${readingTime(post.body)} de lectura</span>
          </div>
        </div>
      </div>`;
  } else {
    heroHtml = `
      <div class="post-hero-noimg">
        <div class="post-hero-content">
          <a href="blog.html" class="post-back" style="color:rgba(255,255,255,.55)">← Blog</a>
          <p class="post-cat">${post.category || ''}</p>
          <h1 class="post-title">${post.title}</h1>
          <div class="post-meta">
            <span>${formatDate(post.date)}</span>
            <span class="post-meta-sep">·</span>
            <span>${readingTime(post.body)} de lectura</span>
          </div>
        </div>
      </div>`;
  }

  // Recent items
  const recentHtml = published.length > 0
    ? published.map(p => `
      <a href="post.html?id=${p.id}" class="recent-item">
        <div class="recent-item-img">${p.image
          ? `<img src="${p.image}" alt="${p.title}" loading="lazy"
              onerror="this.style.display='none';var ph=document.createElement('div');ph.className='recent-item-img-placeholder';ph.textContent='♥';this.parentElement.appendChild(ph);">`
          : '<div class="recent-item-img-placeholder">♥</div>'
        }</div>
        <div class="recent-item-body">
          <p class="recent-item-cat">${p.category || ''}</p>
          <p class="recent-item-title">${p.title}</p>
          <p class="recent-item-date">${formatDate(p.date)}</p>
        </div>
      </a>`).join('')
    : '<p style="font-size:.85rem;color:var(--text-muted);font-style:italic">Aún no hay más artículos.</p>';

  // Nav
  const navHtml = `
    <div class="post-nav">
      ${prevPost
        ? `<a href="post.html?id=${prevPost.id}" class="post-nav-item"><p class="post-nav-dir">← Anterior</p><p class="post-nav-title">${prevPost.title}</p></a>`
        : '<div></div>'}
      ${nextPost
        ? `<a href="post.html?id=${nextPost.id}" class="post-nav-item post-nav-next"><p class="post-nav-dir">Siguiente →</p><p class="post-nav-title">${nextPost.title}</p></a>`
        : '<div></div>'}
    </div>`;

  // Comments
  const comments = getComments(post.id);
  const commentsListHtml = comments.length > 0
    ? comments.map(c => `<div class="comment-item"><p class="comment-author">${c.name}</p><p class="comment-date">${c.date}</p><p class="comment-text">${c.text}</p></div>`).join('')
    : '<p class="no-comments">Sé el primero en comentar.</p>';

  document.getElementById('postContent').innerHTML = `
    ${heroHtml}
    <div class="post-layout fade-up">
      <article class="post-article">
        <div class="post-body">${post.body || ''}</div>

        <div class="share-section">
          <p class="share-title">Compartir este artículo</p>

// ─── Copy link ────────────────────────────────────────────────────────────────
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copiado';
    btn.classList.add('share-copied');
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar enlace';
      btn.classList.remove('share-copied');
    }, 2000);
  });
}

// ─── Submit comment ───────────────────────────────────────────────────────────
function submitComment(postId) {
  const name = document.getElementById('commentName').value.trim();
  const text = document.getElementById('commentText').value.trim();
  if (!name || !text) { alert('Por favor completa tu nombre y comentario.'); return; }
  const comments = getComments(postId);
  comments.push({ name, text, date: new Date().toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' }) });
  saveComments(postId, comments);
  document.getElementById('commentName').value = '';
  document.getElementById('commentText').value = '';
  document.getElementById('commentsList').innerHTML =
    comments.map(c => `<div class="comment-item"><p class="comment-author">${c.name}</p><p class="comment-date">${c.date}</p><p class="comment-text">${c.text}</p></div>`).join('');
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function toggleMenu() {
  const nav = document.getElementById('navLinks');
  const isOpen = nav.classList.toggle('open');
  document.querySelector('.hamburger').setAttribute('aria-expanded', isOpen);
}
document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', () => {
  document.getElementById('navLinks').classList.remove('open');
}));

// ─── Init: load index, then load individual post ──────────────────────────────
async function init() {
  if (!postId) { renderNotFound(); return; }

  try {
    // 1. Load the post index to get metadata for all posts (sidebar, prev/next)
    const idxRes = await fetch('/content/posts/index.json');
    if (!idxRes.ok) throw new Error('Index not found');
    const allPosts = await idxRes.json();

    // 2. Check the post exists and is published
    const meta = allPosts.find(p => p.id === postId && p.published);
    if (!meta) { renderNotFound(); return; }

    // 3. Load the full post JSON
    const postRes = await fetch(`/content/posts/${postId}.json`);
    if (!postRes.ok) { renderNotFound(); return; }
    const post = await postRes.json();

    // 4. Merge allPosts for sidebar/nav (use full post data for current)
    renderPost(post, allPosts);

  } catch (e) {
    console.error(e);
    renderNotFound();
  }
}

init();
