<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Meta tags se inyectan dinámicamente por JS -->
  <title>Cargando… — El Amor Existe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F5EDE0;
      --cream-dark:  #E8DBCA;
      --brown-deep:  #5C3D2E;
      --brown-mid:   #8B5E3C;
      --brown-light: #A67C52;
      --text-body:   #3a2a1e;
      --text-muted:  #8a7060;
      --radius:      2px;
      --transition:  0.3s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background-color: var(--cream);
      color: var(--text-body);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ─── Nav ───────────────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--cream);
      border-bottom: 1px solid var(--cream-dark);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--brown-deep);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--brown-deep); }

    /* ─── Hero del post ─────────────────────────────────────────────── */
    .post-hero {
      max-width: 760px;
      margin: 0 auto;
      padding: 4.5rem 2rem 3rem;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .post-hero.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .post-hero__back {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color var(--transition);
    }

    .post-hero__back:hover { color: var(--brown-deep); }

    .post-hero__meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .post-hero__category {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--brown-light);
      font-weight: 500;
    }

    .post-hero__date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .post-hero__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: var(--brown-deep);
      line-height: 1.2;
      margin-bottom: 1.25rem;
    }

    .post-hero__title em { font-style: italic; }

    .post-hero__excerpt {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ─── Imagen destacada ──────────────────────────────────────────── */
    .post-featured-image {
      max-width: 900px;
      margin: 0 auto 3rem;
      padding: 0 2rem;
    }

    .post-featured-image img {
      width: 100%;
      aspect-ratio: 21 / 9;
      object-fit: cover;
      border-radius: var(--radius);
      display: block;
    }

    /* ─── Cuerpo del artículo ───────────────────────────────────────── */
    .post-body {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
    }

    .post-body.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Tipografía editorial del contenido */
    .post-body h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--brown-deep);
      margin: 2.5rem 0 1rem;
      line-height: 1.3;
    }

    .post-body h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--brown-mid);
      margin: 2rem 0 0.75rem;
    }

    .post-body p {
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--text-body);
      margin-bottom: 1.5rem;
    }

    .post-body blockquote {
      border-left: 2px solid var(--brown-light);
      margin: 2rem 0;
      padding: 0.5rem 0 0.5rem 1.5rem;
    }

    .post-body blockquote p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--brown-mid);
      line-height: 1.6;
      margin-bottom: 0;
    }

    .post-body ul, .post-body ol {
      margin: 0 0 1.5rem 1.5rem;
    }

    .post-body li {
      font-size: 1.05rem;
      line-height: 1.9;
      margin-bottom: 0.4rem;
    }

    .post-body a {
      color: var(--brown-mid);
      text-decoration: underline;
      text-decoration-color: var(--cream-dark);
      transition: text-decoration-color var(--transition);
    }

    .post-body a:hover {
      text-decoration-color: var(--brown-mid);
    }

    /* Divisor decorativo */
    .post-divider {
      text-align: center;
      margin: 3rem 0;
      color: var(--brown-light);
      font-size: 1rem;
      letter-spacing: 0.5em;
      opacity: 0.5;
    }

    /* ─── CTA al final ──────────────────────────────────────────────── */
    .post-cta {
      max-width: 680px;
      margin: 0 auto 5rem;
      padding: 2.5rem 2rem;
      border: 1px solid var(--cream-dark);
      text-align: center;
    }

    .post-cta__label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.75rem;
    }

    .post-cta__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--brown-deep);
      margin-bottom: 1.25rem;
    }

    .post-cta__link {
      display: inline-block;
      padding: 0.7rem 2rem;
      background-color: var(--brown-deep);
      color: var(--cream);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: var(--radius);
      transition: background-color var(--transition);
    }

    .post-cta__link:hover {
      background-color: var(--brown-mid);
    }

    /* ─── Estado: error / no encontrado ────────────────────────────── */
    .post-not-found {
      max-width: 560px;
      margin: 6rem auto;
      padding: 0 2rem;
      text-align: center;
    }

    .post-not-found__icon {
      font-size: 2.5rem;
      opacity: 0.3;
      margin-bottom: 1.5rem;
    }

    .post-not-found__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      color: var(--brown-deep);
      margin-bottom: 0.75rem;
    }

    .post-not-found__text {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.8;
    }

    .post-not-found__link {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brown-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--cream-dark);
      padding-bottom: 2px;
      transition: color var(--transition), border-color var(--transition);
    }

    .post-not-found__link:hover {
      color: var(--brown-deep);
      border-color: var(--brown-deep);
    }

    /* ─── Skeleton de carga ─────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--cream-dark) 25%, #ede0cf 50%, var(--cream-dark) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── Footer ────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--cream-dark);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--brown-deep);
      margin-bottom: 0.75rem;
    }

    .footer-links {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }

    .footer-links a:hover { color: var(--brown-deep); }

    .footer-copy {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0 1.25rem; }
      .nav-links { gap: 1.2rem; }
      .post-hero, .post-body, .post-featured-image, .post-cta { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

  <!-- ── Nav ─────────────────────────────────────────────────────────── -->
  <nav>
    <a href="/index.html" class="nav-brand">El Amor Existe</a>
    <ul class="nav-links">
      <li><a href="/index.html#sinopsis">El libro</a></li>
      <li><a href="/index.html#capitulos">Capítulos</a></li>
      <li><a href="/index.html#autor">El autor</a></li>
      <li><a href="/blog.html" class="active">Blog</a></li>
      <li><a href="https://www.amazon.com/dp/B0F6CZXRC4" target="_blank" rel="noopener">Amazon</a></li>
      <li><a href="/index.html#comprar">Conseguir el libro</a></li>
    </ul>
  </nav>

  <!-- ── Contenido del post (inyectado por JS) ────────────────────────── -->
  <div id="post-root"></div>

  <!-- ── Footer ───────────────────────────────────────────────────────── -->
  <footer>
    <p class="footer-brand">El Amor Existe</p>
    <ul class="footer-links">
      <li><a href="/index.html">Inicio</a></li>
      <li><a href="/index.html#sinopsis">El libro</a></li>
      <li><a href="/index.html#autor">El autor</a></li>
      <li><a href="/blog.html">Blog</a></li>
    </ul>
    <p class="footer-copy">© 2026 Luis Caicedo Sevillano · Todos los derechos reservados</p>
  </footer>

  <!-- ── Script ───────────────────────────────────────────────────────── -->
  <script>
    const root = document.getElementById('post-root');

    /* ── Utilidades ──────────────────────────────────────────────── */
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function setMeta(title, description, image) {
      document.title = `${title} — El Amor Existe`;
      let desc = document.querySelector('meta[name="description"]');
      if (!desc) {
        desc = document.createElement('meta');
        desc.name = 'description';
        document.head.appendChild(desc);
      }
      desc.content = description || '';

      // Open Graph básico
      const og = [
        ['og:title',       title],
        ['og:description', description || ''],
        ['og:image',       image ? (location.origin + image) : ''],
        ['og:type',        'article'],
      ];
      og.forEach(([prop, content]) => {
        let tag = document.querySelector(`meta[property="${prop}"]`);
        if (!tag) {
          tag = document.createElement('meta');
          tag.setAttribute('property', prop);
          document.head.appendChild(tag);
        }
        tag.content = content;
      });
    }

    /* ── Estado: esqueleto de carga ─────────────────────────────── */
    function renderSkeleton() {
      root.innerHTML = `
        <div style="max-width:760px;margin:0 auto;padding:4.5rem 2rem 3rem;text-align:center;" aria-hidden="true">
          <div class="skeleton" style="height:14px;width:80px;margin:0 auto 2rem;border-radius:2px;"></div>
          <div class="skeleton" style="height:14px;width:120px;margin:0 auto 1.5rem;border-radius:2px;"></div>
          <div class="skeleton" style="height:48px;width:70%;margin:0 auto 1.25rem;border-radius:2px;"></div>
          <div class="skeleton" style="height:16px;width:55%;margin:0 auto;border-radius:2px;"></div>
        </div>
        <div style="max-width:900px;margin:0 auto 3rem;padding:0 2rem;" aria-hidden="true">
          <div class="skeleton" style="width:100%;aspect-ratio:21/9;border-radius:2px;"></div>
        </div>`;
    }

    /* ── Estado: error / no encontrado ─────────────────────────── */
    function renderNotFound(message) {
      root.innerHTML = `
        <div class="post-not-found">
          <div class="post-not-found__icon">✦</div>
          <h1 class="post-not-found__title">Entrada no encontrada</h1>
          <p class="post-not-found__text">${message || 'La publicación que buscas no existe o fue removida.'}</p>
          <a class="post-not-found__link" href="/blog.html">← Volver al blog</a>
        </div>`;
    }

    /* ── Render del post completo ───────────────────────────────── */
    function renderPost(post) {
      setMeta(post.title, post.excerpt, post.image);

      const imageHtml = post.image
        ? `<div class="post-featured-image">
             <img src="${post.image}" alt="${post.title}" />
           </div>`
        : '';

      root.innerHTML = `
        <header class="post-hero" id="post-hero">
          <a class="post-hero__back" href="/blog.html">← Volver al blog</a>
          <div class="post-hero__meta">
            <span class="post-hero__category">${post.category || ''}</span>
            ${post.category && post.date ? '<span style="color:var(--cream-dark)">·</span>' : ''}
            <span class="post-hero__date">${formatDate(post.date)}</span>
          </div>
          <h1 class="post-hero__title">${post.title}</h1>
          ${post.excerpt ? `<p class="post-hero__excerpt">${post.excerpt}</p>` : ''}
        </header>

        ${imageHtml}

        <article class="post-body" id="post-body">
          ${post.body}
          <div class="post-divider">✦ ✦ ✦</div>
        </article>

        <div class="post-cta">
          <p class="post-cta__label">¿Te resonó esta reflexión?</p>
          <p class="post-cta__title">El libro que lo profundiza todo</p>
          <a class="post-cta__link" href="/index.html#comprar">Conseguir el libro →</a>
        </div>`;

      // Animar entrada
      requestAnimationFrame(() => {
        document.getElementById('post-hero').classList.add('visible');
        document.getElementById('post-body').classList.add('visible');
      });
    }

    /* ── Carga principal ────────────────────────────────────────── */
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        renderNotFound('No se especificó una publicación.');
        return;
      }

      renderSkeleton();

      try {
        const res = await fetch(`/content/posts/${encodeURIComponent(id)}.json`);

        if (res.status === 404) {
          renderNotFound(`La entrada <em>${id}</em> no fue encontrada.`);
          return;
        }

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const post = await res.json();
        renderPost(post);

      } catch (err) {
        console.error('Error cargando el post:', err);
        renderNotFound('Ocurrió un error al cargar esta publicación. Intenta de nuevo más tarde.');
      }
    }

    loadPost();
  </script>

</body>
</html>
